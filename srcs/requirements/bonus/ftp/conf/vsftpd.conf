listen=YES
listen_ipv6=NO

anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

chroot_local_user=YES
allow_writeable_chroot=YES

pasv_enable=YES
pasv_min_port=50000
pasv_max_port=50010

local_root=/var/www/html
secure_chroot_dir=/var/run/vsftpd/empty

pam_service_name=vsftpd
seccomp_sandbox=NO
background=NO